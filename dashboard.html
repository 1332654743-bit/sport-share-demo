<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>调研数据看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; min-height: 100vh; }
h1 { text-align: center; margin-bottom: 8px; font-size: 22px; }
.subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 24px; }
.progress-bar { background: #2a2a3e; border-radius: 12px; height: 24px; margin-bottom: 24px; position: relative; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #ff6b00, #ff9500); border-radius: 12px; transition: width 0.5s; }
.progress-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12px; font-weight: 600; }
.section { background: #2a2a3e; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
.section h2 { font-size: 15px; margin-bottom: 12px; color: #ff9500; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { padding: 8px 6px; text-align: center; border-bottom: 1px solid #3a3a4e; }
th { color: #888; font-weight: 500; font-size: 11px; }
td { color: #e0e0e0; }
.bar-cell { text-align: left; }
.bar { display: inline-block; height: 16px; background: #ff6b00; border-radius: 3px; margin-right: 6px; vertical-align: middle; min-width: 2px; }
.empty { text-align: center; color: #666; padding: 40px; }
.highlight { color: #ff9500; font-weight: 700; }

/* 数据导入区 */
.import-section { background: #2a2a3e; border-radius: 12px; padding: 16px; margin-bottom: 24px; }
.import-section h2 { font-size: 15px; margin-bottom: 12px; color: #ff9500; }
.import-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.import-btn { background: #ff6b00; color: #fff; border: none; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
.import-btn:hover { background: #ff8c00; }
.import-btn.secondary { background: transparent; border: 1px solid #ff6b00; color: #ff6b00; }
.file-input { display: none; }
.import-status { font-size: 12px; color: #8f8; margin-top: 8px; }
.stored-count { font-size: 12px; color: #888; margin-top: 8px; }
</style>
</head>
<body>
<h1>运动分享调研看板</h1>
<p class="subtitle">从飞书消息中复制 JSON 数据，或上传本地 JSON 文件</p>

<div class="import-section">
  <h2>导入数据</h2>
  <div class="import-row">
    <button class="import-btn" onclick="document.getElementById('file-input').click()">上传 JSON 文件</button>
    <button class="import-btn secondary" onclick="pasteFromClipboard()">从剪贴板粘贴</button>
    <button class="import-btn secondary" onclick="clearData()">清空数据</button>
    <input type="file" id="file-input" class="file-input" multiple accept=".json" onchange="handleFiles(this.files)">
  </div>
  <div class="stored-count" id="stored-count"></div>
  <div class="import-status" id="import-status"></div>
</div>

<div class="progress-bar">
  <div class="progress-fill" id="progress-fill"></div>
  <span class="progress-text" id="progress-text">暂无数据</span>
</div>

<div class="section">
  <h2>场景 × 样式选择</h2>
  <div id="table-style"><p class="empty">导入数据后自动显示</p></div>
</div>

<div class="section">
  <h2>各场景编辑时长</h2>
  <div id="table-duration"><p class="empty">导入数据后自动显示</p></div>
</div>

<div class="section">
  <h2>功能使用率 Top 10</h2>
  <div id="table-features"><p class="empty">导入数据后自动显示</p></div>
</div>

<script>
const TARGET = 20;
const SCENARIO_NAMES = { daily: '日常打卡', pb: '成绩突破', marathon: '马拉松完赛' };
const STORE_KEY = 'dashboard_submissions';

// 从 localStorage 读取已存数据
function getSubmissions() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '[]'); } catch { return []; }
}
function saveSubmissions(subs) {
  localStorage.setItem(STORE_KEY, JSON.stringify(subs));
}

// 导入 JSON 文件
function handleFiles(files) {
  let count = 0;
  const subs = getSubmissions();
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const raw = JSON.parse(e.target.result);
        const sub = normalize(raw);
        if (sub && !isDuplicate(subs, sub)) {
          subs.push(sub);
          count++;
        }
      } catch(err) { console.warn('解析失败:', file.name, err); }
      if (++count >= 0) { // 所有文件读完后刷新
        saveSubmissions(subs);
        render(subs);
        showStatus(`成功导入，当前共 ${subs.length} 份数据`);
      }
    };
    reader.readAsText(file);
  });
}

// 从剪贴板粘贴
async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    const raw = JSON.parse(text);
    const subs = getSubmissions();
    const sub = normalize(raw);
    if (sub && !isDuplicate(subs, sub)) {
      subs.push(sub);
      saveSubmissions(subs);
      render(subs);
      showStatus('粘贴成功！');
    } else {
      showStatus('数据已存在或格式无效');
    }
  } catch(e) {
    showStatus('粘贴失败：请先复制 JSON 文本，或检查浏览器权限');
  }
}

function clearData() {
  if (confirm('确认清空所有已导入的数据？')) {
    localStorage.removeItem(STORE_KEY);
    render([]);
    showStatus('已清空');
  }
}

// 标准化数据格式
function normalize(raw) {
  // 格式1: {userId, data: {events, summary}, submittedAt}
  if (raw.userId && raw.data && raw.data.summary) return raw;
  // 格式2: {events, summary} (直接从 demo 导出的)
  if (raw.events && raw.summary) return { userId: 'file_' + Date.now(), data: raw, submittedAt: '' };
  // 格式3: 飞书消息中复制的完整 JSON
  if (raw.summary && !raw.events) return { userId: raw.userId || 'paste_' + Date.now(), data: raw, submittedAt: raw.submittedAt || '' };
  return null;
}

function isDuplicate(subs, newSub) {
  return subs.some(s => s.userId === newSub.userId);
}

function showStatus(msg) {
  document.getElementById('import-status').textContent = msg;
  setTimeout(() => { document.getElementById('import-status').textContent = ''; }, 3000);
}

// ========== 渲染 ==========
function render(submissions) {
  const total = submissions.length;
  document.getElementById('stored-count').textContent = `已存储 ${total} 份数据`;

  const pct = Math.min(100, (total / TARGET * 100)).toFixed(0);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = total > 0 ? `已收集 ${total} / ${TARGET} 份 (${pct}%)` : '暂无数据';

  if (total === 0) {
    document.getElementById('table-style').innerHTML = '<p class="empty">导入数据后自动显示</p>';
    document.getElementById('table-duration').innerHTML = '<p class="empty">导入数据后自动显示</p>';
    document.getElementById('table-features').innerHTML = '<p class="empty">导入数据后自动显示</p>';
    return;
  }

  // Style matrix
  const styleMatrix = { daily: {}, pb: {}, marathon: {} };
  submissions.forEach(sub => {
    const summary = sub.data?.summary || {};
    Object.entries(summary).forEach(([scenario, info]) => {
      if (!styleMatrix[scenario]) return;
      const style = info.styleChoice || 'unknown';
      styleMatrix[scenario][style] = (styleMatrix[scenario][style] || 0) + 1;
    });
  });

  let styleHTML = '<table><tr><th></th><th>水印海报</th><th>轨迹视频</th><th>运动报告</th></tr>';
  ['daily', 'pb', 'marathon'].forEach(s => {
    const row = styleMatrix[s];
    const t = Object.values(row).reduce((a, b) => a + b, 0) || 1;
    styleHTML += `<tr>
      <td><b>${SCENARIO_NAMES[s]}</b></td>
      <td>${pctStr(row.watermark, t)}</td>
      <td>${pctStr(row.video, t)}</td>
      <td>${pctStr(row.report, t)}</td>
    </tr>`;
  });
  styleHTML += '</table>';
  document.getElementById('table-style').innerHTML = styleHTML;

  // Duration
  const durations = { daily: [], pb: [], marathon: [] };
  submissions.forEach(sub => {
    const summary = sub.data?.summary || {};
    Object.entries(summary).forEach(([scenario, info]) => {
      if (durations[scenario]) durations[scenario].push(info.totalDuration || 0);
    });
  });

  let durHTML = '<table><tr><th>场景</th><th>中位数</th><th>平均值</th><th>最大值</th></tr>';
  ['daily', 'pb', 'marathon'].forEach(s => {
    const arr = durations[s].sort((a, b) => a - b);
    if (arr.length === 0) { durHTML += `<tr><td>${SCENARIO_NAMES[s]}</td><td colspan="3">-</td></tr>`; return; }
    const med = arr[Math.floor(arr.length / 2)];
    const avg = arr.reduce((a, b) => a + b, 0) / arr.length;
    const max = arr[arr.length - 1];
    durHTML += `<tr>
      <td><b>${SCENARIO_NAMES[s]}</b></td>
      <td>${fmtDur(med)}</td>
      <td>${fmtDur(avg)}</td>
      <td>${fmtDur(max)}</td>
    </tr>`;
  });
  durHTML += '</table>';
  document.getElementById('table-duration').innerHTML = durHTML;

  // Feature usage
  const featureCount = {};
  submissions.forEach(sub => {
    const summary = sub.data?.summary || {};
    Object.values(summary).forEach(info => {
      (info.featuresUsed || []).forEach(f => {
        featureCount[f] = (featureCount[f] || 0) + 1;
      });
    });
  });

  const sorted = Object.entries(featureCount).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const maxCount = sorted[0] ? sorted[0][1] : 1;

  let featHTML = '<table>';
  sorted.forEach(([feat, count]) => {
    const barW = Math.round(count / maxCount * 120);
    const rate = (count / total * 100).toFixed(0);
    featHTML += `<tr>
      <td style="text-align:left;width:35%">${feat}</td>
      <td class="bar-cell"><span class="bar" style="width:${barW}px"></span>${rate}%</td>
      <td style="width:15%">${count}人</td>
    </tr>`;
  });
  featHTML += '</table>';
  document.getElementById('table-features').innerHTML = featHTML;
}

function pctStr(count, total) {
  if (!count) return '<span style="color:#555">0%</span>';
  const p = (count / total * 100).toFixed(0);
  return `<span class="highlight">${p}%</span> (${count})`;
}

function fmtDur(ms) {
  const s = Math.round(ms / 1000);
  if (s < 60) return s + '秒';
  return Math.floor(s / 60) + '分' + (s % 60) + '秒';
}

// 页面加载时渲染已有数据
render(getSubmissions());
</script>
</body>
</html>
